name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive app version from tag
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          if [[ ! "$tag" =~ ^v ]]; then
            echo "Tag '$tag' must start with 'v'" && exit 1
          fi
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '$version' is not a valid semver-like value" && exit 1
          fi
          echo "APP_VERSION=$version" >> $GITHUB_ENV
          echo "Using app version '$version' from tag '$tag'"

      - name: Sync package.json version
        shell: bash
        run: |
          npm pkg set version="$APP_VERSION"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "$APP_VERSION" ]; then
            echo "package.json version '$pkg_version' does not match '$APP_VERSION'" && exit 1
          fi
          echo "package.json version synced to '$pkg_version'"

      - name: Build Electron App
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: release-win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-win/*.exe
            release-win/*.exe.blockmap
            release-win/latest.yml
            release-linux/*.deb
            release-linux/latest-linux.yml
